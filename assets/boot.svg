<svg width="100%" viewBox="0 0 1000 400" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bootTitle bootDesc">
  <title id="bootTitle">PureUNIX boot sequence</title>
  <desc id="bootDesc">
    Simulated framebuffer console showing PureUNIX booting: entering protected mode,
    physical memory allocator online, root filesystem mounted, process table
    initialized, task scheduler active, signal delivery online, xHCI controller
    detected, control transfer negotiation, then a shell prompt with a blinking
    cursor at vihaan at pureunix, tilde.
  </desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b0e12"/>
      <stop offset="100%" stop-color="#090b0e"/>
    </linearGradient>

    <linearGradient id="edge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a323a"/>
      <stop offset="100%" stop-color="#171c21"/>
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.1" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <rect width="4" height="4" fill="transparent"/>
      <rect width="4" height="1" fill="#ffffff" opacity="0.02"/>
    </pattern>

    <clipPath id="panelClip">
      <rect x="1" y="1" width="998" height="398" rx="10"/>
    </clipPath>
  </defs>

  <g clip-path="url(#panelClip)">
    <rect x="1" y="1" width="998" height="398" rx="10" fill="url(#bg)"/>
    <rect x="1" y="1" width="998" height="398" rx="10" fill="url(#scan)"/>

    <!-- top chrome bar -->
    <rect x="1" y="1" width="998" height="34" fill="#0d1013"/>
    <circle cx="26" cy="18" r="5" fill="#2a2f35"/>
    <circle cx="44" cy="18" r="5" fill="#2a2f35"/>
    <circle cx="62" cy="18" r="5" fill="#2a2f35"/>
    <text x="500" y="22" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="12" fill="#4b5761" letter-spacing="1.5">/dev/console — pureunix</text>
    <line x1="1" y1="35" x2="999" y2="35" stroke="#1c232b" stroke-width="1"/>

    <!-- boot log -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace" font-size="15">

      <text x="40" y="76" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.000000]</tspan><tspan fill="#c9d3d6"> pureunix: entering protected mode</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="0.15s" dur="0.12s" fill="freeze"/>
      </text>

      <text x="40" y="104" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.000473]</tspan><tspan fill="#c9d3d6"> mm: physical page allocator online</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="0.45s" dur="0.12s" fill="freeze"/>
      </text>

      <text x="40" y="132" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.001337]</tspan><tspan fill="#c9d3d6"> vfs: root filesystem mounted</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="0.75s" dur="0.12s" fill="freeze"/>
      </text>

      <text x="40" y="160" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.002950]</tspan><tspan fill="#c9d3d6"> proc: process table initialized</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="1.05s" dur="0.12s" fill="freeze"/>
      </text>

      <text x="40" y="188" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.004096]</tspan><tspan fill="#c9d3d6"> sched: task scheduler active</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="1.35s" dur="0.12s" fill="freeze"/>
      </text>

      <text x="40" y="216" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.005611]</tspan><tspan fill="#c9d3d6"> signal: delivery and fork/exec/wait online</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="1.65s" dur="0.12s" fill="freeze"/>
      </text>

      <text x="40" y="244" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.006942]</tspan><tspan fill="#7fb3ac"> usb: xHCI controller detected</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="1.95s" dur="0.12s" fill="freeze"/>
      </text>

      <text x="40" y="272" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.009118]</tspan><tspan fill="#7fb3ac"> usb: control transfer negotiation</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="2.25s" dur="0.12s" fill="freeze"/>
      </text>

      <text x="40" y="300" opacity="1" filter="url(#glow)">
        <tspan fill="#4b5b63">[    0.010000]</tspan><tspan fill="#c9d3d6"> userland: starting /bin/sh</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="2.55s" dur="0.12s" fill="freeze"/>
      </text>

      <!-- prompt line -->
      <text x="40" y="344" opacity="0" font-size="16">
        <tspan fill="#7fd1ae">vihaan</tspan><tspan fill="#5b6a72">@</tspan><tspan fill="#7fd1ae">pureunix</tspan><tspan fill="#5b6a72">:</tspan><tspan fill="#8fa3ad">~$</tspan>
        <animate attributeName="opacity" from="0" to="1" begin="3.0s" dur="0.2s" fill="freeze"/>
      </text>

      <rect x="118" y="330" width="10" height="18" fill="#c9d3d6" opacity="0">
        <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.001;0.01;0.5;0.51;1" begin="3.2s" dur="1s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- subtle vignette -->
    <rect x="1" y="1" width="998" height="398" rx="10" fill="none" stroke="url(#edge)" stroke-width="1.5"/>
  </g>
</svg>
